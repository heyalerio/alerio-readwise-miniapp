<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Alerio Readwise Discord Card</title>
  <desc id="desc">Share card for Alerio Readwise, a Mentra glasses app for reading video capture and approval-gated Readwise highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="110" y1="40" x2="1090" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173F3B"/>
      <stop offset="0.52" stop-color="#0D2B35"/>
      <stop offset="1" stop-color="#091B27"/>
    </linearGradient>
    <linearGradient id="panel" x1="92" y1="88" x2="1110" y2="550" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#163E3A" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0A1D28" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="pageLeft" x1="136" y1="179" x2="296" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7E3"/>
      <stop offset="1" stop-color="#F4E6C2"/>
    </linearGradient>
    <linearGradient id="pageRight" x1="300" y1="179" x2="459" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8EECF"/>
      <stop offset="1" stop-color="#E6D4AD"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#041219" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="96" r="126" fill="#2EA7A0" opacity="0.13"/>
  <circle cx="1038" cy="532" r="186" fill="#F5B82E" opacity="0.08"/>
  <circle cx="80" cy="570" r="160" fill="#80D8D2" opacity="0.07"/>
  <rect x="72" y="72" width="1056" height="486" rx="54" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.14"/>

  <g transform="translate(126 132)" filter="url(#shadow)">
    <rect x="0" y="0" width="336" height="336" rx="74" fill="#0E2D35"/>
    <circle cx="260" cy="67" r="38" fill="#2EA7A0" opacity="0.2"/>
    <path d="M66 93h69c26 0 47 21 47 47v121h-79c-21 0-37-16-37-37V93Z" fill="url(#pageLeft)"/>
    <path d="M155 140c0-26 21-47 47-47h69v131c0 21-16 37-37 37h-79V140Z" fill="url(#pageRight)"/>
    <path d="M168 113v147" stroke="#12333A" stroke-width="12" stroke-linecap="round"/>
    <path d="M95 153h47c15 0 26-12 26-27 0 15 12 27 27 27h47" fill="none" stroke="#12333A" stroke-width="15" stroke-linecap="round"/>
    <circle cx="140" cy="153" r="12" fill="#12333A"/>
    <circle cx="198" cy="153" r="12" fill="#12333A"/>
    <circle cx="140" cy="153" r="5" fill="#80D8D2"/>
    <circle cx="198" cy="153" r="5" fill="#80D8D2"/>
    <path d="M94 195h95" stroke="#F5B82E" stroke-width="19" stroke-linecap="round"/>
    <path d="M209 195h32" stroke="#F5B82E" stroke-width="12" stroke-linecap="round"/>
    <path d="M168 48l23 39h-46l23-39Z" fill="#F5B82E"/>
  </g>

  <g fill="#F9F3E3">
    <text x="520" y="222" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800" letter-spacing="0">Alerio Readwise</text>
    <text x="522" y="286" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="650" letter-spacing="0" fill="#9FDED8">Mentra glasses to Readwise, with approval.</text>
    <text x="522" y="354" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" letter-spacing="0" fill="#F3E4C2">Record reading video and audio, extract highlights,</text>
    <text x="522" y="392" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500" letter-spacing="0" fill="#F3E4C2">remember book context, then approve before sending.</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700">
    <rect x="522" y="436" width="166" height="44" rx="22" fill="#F5B82E"/>
    <text x="553" y="465" fill="#102C34">Open source</text>
    <rect x="708" y="436" width="192" height="44" rx="22" fill="#F9F3E3"/>
    <text x="739" y="465" fill="#102C34">Book memory</text>
    <rect x="920" y="436" width="146" height="44" rx="22" fill="#F9F3E3"/>
    <text x="951" y="465" fill="#102C34">No spam</text>
  </g>
</svg>
