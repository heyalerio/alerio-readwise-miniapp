name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg tesseract-ocr

      - name: Install dependencies
        run: npm ci

      - name: Run sandbox checks
        run: npm run test:sandbox
